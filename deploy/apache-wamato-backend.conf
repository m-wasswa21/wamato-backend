# /etc/apache2/sites-available/backend.wamatoestatesmanagementuganda.online.conf
# Wamato Backend API — port 8002

<VirtualHost *:80>
    ServerName backend.wamatoestatesmanagementuganda.online

    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName backend.wamatoestatesmanagementuganda.online

    # SSL — managed by Certbot
    SSLEngine On
    SSLCertificateFile    /etc/letsencrypt/live/backend.wamatoestatesmanagementuganda.online/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/backend.wamatoestatesmanagementuganda.online/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Enable required proxy modules
    ProxyPreserveHost On
    ProxyRequests Off

    # Proxy all traffic to Docker container on port 8002
    ProxyPass        /  http://127.0.0.1:8002/
    ProxyPassReverse /  http://127.0.0.1:8002/

    # WebSocket support (for /api/v1/messages/ws)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/(.*)$ ws://127.0.0.1:8002/$1 [P,L]

    # Upload file size limit (match MAX_FILE_SIZE_MB=10)
    LimitRequestBody 10485760

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/wamato-backend-error.log
    CustomLog ${APACHE_LOG_DIR}/wamato-backend-access.log combined
</VirtualHost>
